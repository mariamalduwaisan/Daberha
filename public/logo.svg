<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9B51E0"/>
      <stop offset="55%" stop-color="#6A4FD8"/>
      <stop offset="100%" stop-color="#4A90E2"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="200" height="200" rx="44"/>
    </clipPath>
  </defs>

  <!-- Background with gradient -->
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>

  <!-- Subtle inner highlight -->
  <rect width="200" height="100" rx="44" fill="white" fill-opacity="0.06"/>

  <!-- Arabic wordmark: دبرها -->
  <!-- Using path-based outlines to approximate the calligraphic style -->
  <text
    x="100"
    y="125"
    font-family="'Cairo', 'Noto Naskh Arabic', 'Arabic UI Display', serif"
    font-size="88"
    font-weight="800"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-2"
  >دبرها</text>
</svg>
